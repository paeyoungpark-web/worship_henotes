<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리교회 찬양팀 실황 모니터</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🎵 찬양팀 실황 모니터</h1>
    <p class="hint">🎧 헤드폰 사용을 권장합니다 · 와이파이 환경 권장</p>
  </header>

  <main>
    <!-- 곡 목록 뷰 -->
    <section id="view-list" class="view">
      <h2>곡 목록</h2>
      <div id="song-list"></div>
    </section>

    <!-- 플레이어 뷰 -->
    <section id="view-player" class="view hidden">
      <button id="back-btn" class="back-btn">← 목록으로</button>
      <h2 id="song-title"></h2>
      <p id="song-date" class="meta"></p>

      <div class="my-part">
        <label for="my-part-select">🎤 내 파트:</label>
        <select id="my-part-select"></select>
      </div>

      <div class="transport sticky">
        <button id="play-btn">▶ 재생</button>
        <button id="pause-btn">⏸</button>
        <button id="stop-btn">⏹</button>
        <span id="time-display">0:00 / 0:00</span>
      </div>

      <input type="range" id="seek-bar" value="0" min="0" max="1000" step="1">

      <div class="loop-controls">
        <button id="loop-a-btn">🔁 A 지점</button>
        <button id="loop-b-btn">🔁 B 지점</button>
        <button id="loop-toggle-btn">구간반복 OFF</button>
      </div>

      <div class="presets">
        <h3>프리셋</h3>
        <div class="preset-buttons">
          <button data-preset="all">전체</button>
          <button data-preset="me_solo">내 파트만</button>
          <button data-preset="me_full">내 파트 + 풀밴드</button>
          <button data-preset="me_rhythm">내 파트 + 리듬</button>
          <button data-preset="me_keys">내 파트 + 키</button>
          <button data-preset="me_minus">내 파트 빼고 (MR)</button>
        </div>
      </div>

      <div id="track-groups"></div>

      <div class="actions">
        <button id="copy-mix-btn">📋 현재 믹스값 복사</button>
        <button id="feedback-btn">💬 피드백 남기기</button>
      </div>

      <div id="loading" class="loading hidden">
        <p>로딩 중... <span id="loading-progress">0</span>%</p>
      </div>
    </section>
  </main>

  <script src="js/mixer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
